name: release

# Publishes the `agentmirror` CLI to npm when a version tag is pushed.
# Prerequisites (one-time, human):
#   1. Create the npm package name (verify `agentmirror` is available, or rename).
#   2. Add an npm automation token as the repo secret `NPM_TOKEN`.
# Then: bump versions, `git tag v0.1.0 && git push --tags`.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish -w agentmirror --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
